<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Chat - Pocket Edu Web</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0b1220;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;

}

.chatTop{

height:70px;
background:#111827;
display:flex;
align-items:center;
padding:0 15px;
gap:12px;
border-bottom:1px solid rgba(255,255,255,.08);

}

.backBtn{

width:42px;
height:42px;
border:none;
border-radius:12px;
background:#1f2937;
color:#fff;
font-size:18px;

}

.friendEmoji{

width:50px;
height:50px;
border-radius:50%;
background:#1f2937;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;

}

.friendInfo{

flex:1;

}

.friendName{

font-size:18px;
font-weight:600;

}

.friendStatus{

font-size:13px;
opacity:.7;

}

.chatMessages{

flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
background:#0b1220;

}

.message{

max-width:80%;
padding:12px 15px;
border-radius:16px;
word-break:break-word;

}

.me{

align-self:flex-end;
background:#2563eb;

}

.other{

align-self:flex-start;
background:#1f2937;

}

.chatBottom{

display:flex;
gap:10px;
padding:12px;
background:#111827;

}

#messageInput{

flex:1;
height:48px;
border:none;
outline:none;
background:#1f2937;
color:#fff;
border-radius:14px;
padding:0 15px;

}

#sendBtn{

width:55px;
border:none;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:18px;

}

</style>

</head>

<body>

<header class="chatTop">

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div
id="friendEmoji"
class="friendEmoji">

😀

</div>

<div class="friendInfo">

<div
id="friendName"
class="friendName">

Loading...

</div>

<div
id="friendStatus"
class="friendStatus">

Offline

</div>

</div>

</header>

<div
id="chatMessages"
class="chatMessages">

<!-- Messages -->

</div>

<div class="chatBottom">

<input
type="text"
id="messageInput"
placeholder="Type a message...">

<button
id="sendBtn">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<script
type="module"
src="js/firebase.js"></script>

<script
type="module"
src="js/chat.js"></script>

</body>

</html>
