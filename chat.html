<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Chat - Pocket Edu</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0f172a;

color:white;

height:100vh;

display:flex;

flex-direction:column;

}

header{

height:70px;

background:#111827;

display:flex;

align-items:center;

padding:0 18px;

gap:15px;

border-bottom:1px solid #1f2937;

}

.backBtn{

width:42px;

height:42px;

border:none;

border-radius:50%;

background:#1f2937;

color:white;

font-size:18px;

}

.friendEmoji{

font-size:28px;

}

.friendInfo h3{

font-size:18px;

}

.friendInfo p{

font-size:13px;

opacity:.7;

}

#chatBox{

flex:1;

overflow:auto;

padding:18px;

display:flex;

flex-direction:column;

gap:14px;

}

.myMessage{

align-self:flex-end;

background:#2563eb;

padding:12px 16px;

border-radius:18px 18px 0 18px;

max-width:75%;

}

.friendMessage{

align-self:flex-start;

background:#1f2937;

padding:12px 16px;

border-radius:18px 18px 18px 0;

max-width:75%;

}

.msgTime{

font-size:11px;

opacity:.6;

margin-top:6px;

text-align:right;

}

.sendArea{

height:70px;

display:flex;

padding:12px;

gap:10px;

background:#111827;

}

#messageInput{

flex:1;

border:none;

outline:none;

padding:14px;

border-radius:15px;

background:#1f2937;

color:white;

}

#sendBtn{

width:55px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-size:18px;

}

</style>

</head>

<body>

<header>

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div
class="friendEmoji"
id="friendEmoji">

😀

</div>

<div class="friendInfo">

<h3 id="friendName">

Loading...

</h3>

<p id="friendStatus">

Offline

</p>

</div>

</header>

<div id="chatBox">

</div>

<div class="sendArea">

<input

id="messageInput"

placeholder="Type a message">

<button id="sendBtn">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<div id="toast"></div>

<script
type="module"
src="js/firebase.js"></script>

<script
type="module"
src="js/chat.js"></script>

</body>

</html>
