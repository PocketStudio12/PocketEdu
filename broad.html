<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pocket Edu Web - Broad Questions</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{

background:#070b17;

color:#fff;

}

.header{

position:sticky;

top:0;

z-index:100;

display:flex;

align-items:center;

gap:15px;

padding:16px;

background:#070b17;

border-bottom:1px solid rgba(255,255,255,.08);

}

.backBtn{

width:48px;

height:48px;

border:none;

border-radius:14px;

background:rgba(255,255,255,.08);

color:#fff;

font-size:18px;

cursor:pointer;

}

#pageTitle{

font-size:20px;

font-weight:600;

}

#content{

padding:20px;

min-height:calc(100vh - 90px);

word-break:break-word;

overflow-x:auto;

}

#content img{

max-width:100%;

height:auto;

border-radius:12px;

}

#content table{

width:100%;

border-collapse:collapse;

margin:20px 0;

}

#content table td,
#content table th{

border:1px solid rgba(255,255,255,.15);

padding:10px;

}

#content iframe,
#content video{

max-width:100%;

border-radius:12px;

}

.empty{

padding:50px 20px;

text-align:center;

color:#b8c3d8;

font-size:18px;

}

</style>

</head>

<body>

<div id="loader">

<div class="loaderCircle"></div>

<h2>Pocket Edu Web</h2>

</div>

<div class="header">

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div id="pageTitle">

Broad Questions

</div>

</div>

<div id="content">

<div class="empty">

লোড হচ্ছে...

</div>

</div>

<div id="toast"></div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/broad.js"></script>

</body>

</html>
