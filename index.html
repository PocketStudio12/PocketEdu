<!DOCTYPE html>
<html lang="bn">
<head>
<meta property="og:title" content="Pocket Edu Web">
    <meta property="og:description" content="Education Web Online">
    <meta property="og:image" content="https://pocketstudio.qzz.io/icon.png">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pocket Edu Web - Login</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div id="loader">

<div class="loaderCircle"></div>

<h2>Pocket Edu Web</h2>

<p>Loading...</p>

</div>

<div class="background">

<div class="blob blob1"></div>

<div class="blob blob2"></div>

<div class="blob blob3"></div>

</div>

<div class="loginContainer">

<div class="logoBox">

<div class="logo">

<i class="fa-solid fa-graduation-cap"></i>

</div>

<h1>Pocket Edu Web</h1>

<p>বাংলার আধুনিক শিক্ষামূলক প্ল্যাটফর্ম</p>

</div>

<form id="loginForm">

<div class="inputGroup">

<label>

<i class="fa-solid fa-phone"></i>

মোবাইল নম্বর

</label>

<input
type="tel"
id="phone"
placeholder="01XXXXXXXXX"
required>

</div>

<div class="inputGroup">

<label>

<i class="fa-solid fa-lock"></i>

পাসওয়ার্ড

</label>

<div class="passwordBox">

<input
type="password"
id="password"
placeholder="********"
required>

<button
type="button"
id="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<button
type="submit"
class="loginBtn">

<i class="fa-solid fa-right-to-bracket"></i>

লগইন করুন

</button>

<a
href="register.html"
class="createBtn">

<i class="fa-solid fa-user-plus"></i>

নতুন অ্যাকাউন্ট তৈরি করুন

</a>

</form>

<div class="footerText">

Pocket Edu Web © 2026

</div>

</div>

<div id="toast"></div>

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
