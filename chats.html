<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Chats - Pocket Edu Web</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/chats.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"

<body>

<header class="chatHeader">

<i class="fa-solid fa-comments"></i>

Chats

</h2>

<button
id="addFriendBtn">

<i class="fa-solid fa-user-plus"></i>

Add Friend

</button>

</header>

<div class="searchBox">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchFriend"
placeholder="বন্ধু খুঁজুন">

</div>

<div
id="friendList"
class="friendList">

<!-- Friends -->

</div>

<!-- ========================= -->

<div
id="addFriendModal"
class="modal">

<div class="modalBox">

<h3>

Add Friend

</h3>

<input

type="text"

id="searchUsername"

placeholder="Enter Username">

<button
id="searchUserBtn">

Search

</button>

<div
id="searchResult">

</div>

<button
id="closeModal">

Close

</button>

</div>

</div>

<nav class="bottomNav">

<button class="navItem active">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</button>

class="navItem"
onclick="location.href='chats.html'">

<i class="fa-solid fa-comments"></i>

<span>Chats</span>

</button>

<button class="navItem"
onclick="location.href='notification.html'">

<i class="fa-solid fa-bell"></i>

<span>Notification</span>

</button>

<button class="navItem"
onclick="location.href='profile.html'">

</nav>

<script
type="module"
src="js/chats.js"></script>
