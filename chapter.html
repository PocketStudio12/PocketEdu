<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pocket Edu Web - Chapters</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/home.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

.header{

display:flex;

align-items:center;

gap:15px;

padding:20px;

}

.backBtn{

width:48px;

height:48px;

border:none;

border-radius:14px;

background:rgba(255,255,255,.08);

color:#fff;

font-size:18px;

cursor:pointer;

}

#subjectTitle{

font-size:23px;

font-weight:700;

}

.chapterList{

padding:18px;

display:flex;

flex-direction:column;

gap:15px;

padding-bottom:90px;

}

.chapterCard{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

cursor:pointer;

transition:.25s;

}

.chapterCard:hover{

transform:translateY(-3px);

border-color:#4f8cff;

}

.chapterNumber{

font-size:13px;

color:#7fb0ff;

margin-bottom:8px;

}

.chapterName{

font-size:18px;

font-weight:600;

}

</style>

</head>

<body>

<div id="loader">

<div class="loaderCircle"></div>

<h2>Pocket Edu Web</h2>

</div>

<div class="header">

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div>

<div id="subjectTitle">

Loading...

</div>

</div>

</div>

<div class="searchBox">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="searchChapter"
placeholder="অধ্যায় খুঁজুন...">

</div>

<div
id="chapterContainer"
class="chapterList">

</div>

<div id="toast"></div>

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/chapter.js"></script>

</body>

</html>
