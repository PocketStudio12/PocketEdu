<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pocket Edu Web - Chapter Content</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{

background:#070b17;

padding:20px;

}

.header{

display:flex;

align-items:center;

gap:15px;

margin-bottom:30px;

}

.backBtn{

width:50px;

height:50px;

border:none;

border-radius:15px;

background:rgba(255,255,255,.08);

color:#fff;

font-size:18px;

cursor:pointer;

}

#chapterTitle{

font-size:22px;

font-weight:700;

}

.main{

display:flex;

flex-direction:column;

gap:20px;

margin-top:40px;

}

.openBtn{

height:120px;

border:none;

border-radius:22px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:22px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

.openBtn:hover{

transform:translateY(-4px);

border-color:#4f8cff;

background:rgba(79,140,255,.08);

}

.openBtn i{

font-size:34px;

display:block;

margin-bottom:12px;

color:#4f8cff;

}

</style>

</head>

<body>

<div id="loader">

<div class="loaderCircle"></div>

<h2>Pocket Edu Web</h2>

</div>

<div class="header">

<button
class="backBtn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div id="chapterTitle">

Loading...

</div>

</div>

<div class="main">

<button
class="openBtn"
id="shortBtn">

<i class="fa-solid fa-list-check"></i>

Short Questions

</button>

<button
class="openBtn"
id="broadBtn">

<i class="fa-solid fa-book-open"></i>

Broad Questions

</button>

</div>

<div id="toast"></div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/content.js"></script>

</body>

</html>
